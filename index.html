<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Habibi — Dubai concierge (WIP)</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Phase 1: still a blank page in the browser, but the mock APIs are all
         wired up and reachable from the DevTools console under `habibi.*`.
         Real UI arrives in Phase 3. -->
    <main class="shell">
      <h1>Habibi</h1>
      <p class="muted">Your Dubai concierge. Coming to life phase by phase.</p>
      <p class="muted small">Open the DevTools console — everything is under <code>habibi.*</code>. See README for console checks.</p>
    </main>

    <!-- Load order matters. Plain scripts (no bundler):
         1) mocks first (they publish to window.habibi.*)
         2) memory + tools (agent depends on both)
         3) agent (needs tools' schemas)
         4) app.js — bootstrap, always last. -->
    <script src="clock.js"></script>
    <script src="contextApi.js"></script>
    <script src="historyApi.js"></script>
    <script src="moiApi.js"></script>
    <script src="patternMiner.js"></script>
    <script src="memory.js"></script>
    <script src="tools.js"></script>
    <script src="agent.js"></script>
    <script src="app.js"></script>
  </body>
</html>
